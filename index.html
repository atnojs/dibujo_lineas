<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imágenes Lineales</title>

  <!-- Fuentes requeridas -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="app.css" />
  <link rel="icon" href="https://www.atnojs.es/imagenes/favicon_negro1.ico" type="image/x-icon">
</head>
<body>
  <main class="container">
    <h1>Imágenes a Lineales</h1>
    <p class="subtitle">Sube varias imágenes a la vez y la app las procesará de una en una.</p>

    <div class="upload-area">
      <input type="file" id="image-input" accept="image/*" hidden multiple />
      <label for="image-input" class="upload-label">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
        <span>Seleccionar Imágenes (una o varias)</span>
      </label>
    </div>

    <!-- Vista previa de imágenes subidas -->
    <div id="preview-section" class="preview-section hidden">
      <h3 style="margin-bottom:1rem;color:var(--text)">Imágenes seleccionadas:</h3>
      <div id="preview-grid" class="preview-grid"></div>
    </div>

    <div id="processing-section" class="processing-section hidden">
      <p id="progress-text">Procesando 1 de 0.</p>
      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <div class="spinner-container" id="spinner-container">
        <div class="spinner"></div>
      </div>
    </div>

    <button id="start-button" class="button-start" disabled>Iniciar Procesamiento</button>

    <h2 class="gallery-title hidden">Resultados Generados</h2>
    <div id="results-gallery" class="results-gallery"></div>

    <div id="error-message" class="error-message hidden"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
